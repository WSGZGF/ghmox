            align-items: center;
            gap: 8px;
            border-top: 1px solid #e2eaf2;

            box-shadow: 0 6px 16px rgba(0,0,0,0.04);

    // 过滤空数据
    const data = rawData.filter(row => row[0] && row[0].startsWith('GX'));

    // ---------- 精准匹配算法 ----------
    function extractKeywords(models) {
        if (!models || models.trim() === '') return [];
        // 按 / 和 空格 分割，并清理
        const parts = models.split(/[\/\s]+/).filter(s => s.length > 1);
        return parts.map(s => s.replace(/[，、：:；;，,。.、\-—\-—]/g, ' ').trim()).filter(s => s.length > 0);
    }

    // 构建索引：每个关键词关联到编号和原始机型
    const searchIndex = [];
    data.forEach(([code, models]) => {
        if (!models || models.trim() === '') return;
        const keys = extractKeywords(models);
        const uniqueKeys = [...new Set(keys)];
        uniqueKeys.forEach(key => {
            if (key.length > 1) {
                searchIndex.push({ 
                    key: key.toLowerCase(), 
                    code: code,
                    original: models
                });
            }
        });
    });

    // 排序：优先匹配长度更长的关键词 (更精准)
    searchIndex.sort((a, b) => b.key.length - a.key.length);

    function smartSearch(query) {
        if (!query || query.trim() === '') return null;
        const q = query.toLowerCase().trim();

        // 1. 精准匹配 (完整匹配)
        for (let item of searchIndex) {
            if (item.key === q) {
                return { code: item.code, matchedKey: item.key };
            }
        }

        // 2. 包含匹配 (按关键词长度降序)
        for (let item of searchIndex) {
            if (item.key.includes(q) && q.length >= 3) {
                return { code: item.code, matchedKey: item.key };
            }
        }

        // 3. 反向包含 (q 包含 key)
        for (let item of searchIndex) {
            if (q.includes(item.key) && item.key.length >= 3) {
                return { code: item.code, matchedKey: item.key };
            }
        }

        // 4. 拆分匹配 (按空格拆分后再匹配)
        const words = q.split(/[\s\/\-]+/).filter(w => w.length > 2);
        for (let word of words) {
            for (let item of searchIndex) {
                if (item.key.includes(word) || word.includes(item.key)) {
                    return { code: item.code, matchedKey: item.key };
                }
            }
        }

        return null;
    }

    function getRowByCode(code) {
        return data.find(row => row[0] === code);
    }

    // ---------- UI 渲染 ----------
    const tbody = document.getElementById('tableBody');
    function renderTable(rows) {
        tbody.innerHTML = '';
        rows.forEach(row => {
            const tr = document.createElement('tr');
            tr.dataset.code = row[0];
            const td1 = document.createElement('td');
            td1.className = 'code-cell';
            td1.textContent = row[0];
            const td2 = document.createElement('td');
            td2.className = 'model-cell';
            td2.textContent = (row[1] || '').replace(/<br>/g, ' ').substring(0, 120) + (row[1] && row[1].length > 120 ? '…' : '');
            const tdPlaceholder = document.createElement('td');
            tdPlaceholder.textContent = '—';
            tdPlaceholder.style.fontSize = '0.7rem';
            tdPlaceholder.style.color = '#aaa';
            tr.appendChild(td1);
            tr.appendChild(tdPlaceholder);
            tr.appendChild(td2);
            tbody.appendChild(tr);
        });
    }
    renderTable(data);

    // ---------- 搜索逻辑 ----------
    const searchInput = document.getElementById('searchInput');
    const searchBtn = document.getElementById('searchBtn');
    const resultCard = document.getElementById('resultCard');
    const resultCode = document.getElementById('resultCode');
    const resultModel = document.getElementById('resultModel');
    const autoTip = document.getElementById('autoTip');

    function performSearch(query) {
        if (!query || query.trim() === '') {
            document.querySelectorAll('#tableBody tr').forEach(tr => tr.classList.remove('highlight-row'));
            resultCard.style.display = 'none';
            autoTip.style.display = 'none';
            return;
        }

        const result = smartSearch(query);

        document.querySelectorAll('#tableBody tr').forEach(tr => {
            tr.classList.remove('highlight-row');
            if (result && tr.dataset.code === result.code) {
                tr.classList.add('highlight-row');
            }
        });

        if (result) {
            const row = getRowByCode(result.code);
            resultCard.style.display = 'flex';
            resultCard.classList.remove('no-result');
            resultCode.textContent = result.code;
            const displayModel = row ? (row[1] || '') : '';
            resultModel.textContent = displayModel.length > 60 ? displayModel.substring(0,60)+'…' : displayModel;
            autoTip.style.display = 'block';
            autoTip.textContent = `✅ 匹配成功！编号 ${result.code} (匹配关键词: ${result.matchedKey})`;
        } else {
            resultCard.style.display = 'flex';
            resultCard.classList.add('no-result');
            resultCode.textContent = '未找到';
            resultModel.textContent = '请尝试其他关键词';
            autoTip.style.display = 'block';
            autoTip.textContent = '❌ 未匹配到对应编号，请尝试手动输入更准确的关键词';
        }
    }

    searchBtn.addEventListener('click', () => {
        performSearch(searchInput.value);
    });

    searchInput.addEventListener('keyup', (e) => {
        if (e.key === 'Enter') performSearch(searchInput.value);
    });

    // ---------- URL 参数自动识别 ----------
    function handleUrlParams() {
        const params = new URLSearchParams(window.location.search);
        const model = params.get('model');
        if (model && model.trim() !== '') {
            searchInput.value = model;
            autoTip.style.display = 'block';
            autoTip.textContent = `🔍 检测到设备型号参数: ${model}，正在匹配...`;
            performSearch(model);
        }
    }

    // ---------- 二维码 ----------
    const qrContainer = document.getElementById('qrcode');
    const siteUrl = 'https://wsgzgf.github.io/ghmox/';
    qrContainer.innerHTML = '';
    new QRCode(qrContainer, {
        text: siteUrl,
        width: 140,
        height: 140,
        colorDark: '#0b1e33',
        colorLight: '#ffffff',
        correctLevel: QRCode.CorrectLevel.H
    });

    window.addEventListener('DOMContentLoaded', () => {
        handleUrlParams();
        resultCard.style.display = 'none';
        autoTip.style.display = 'none';
    });

    window.performSearch = performSearch;
})();
</script>
