    const data = rawData.filter(row => row[0] && row[0].startsWith('GX'));

    // ================================================================
    // 3. 构建搜索索引 (从适用机型中提取关键词)
    // ================================================================
    function extractAllKeywords(text) {
        if (!text || text.trim() === '') return [];
        const cleaned = text
            .replace(/[，、：:；;，,。.、\-—\-—（）()\s]+/g, '/')
            .replace(/\/\//g, '/')
            .replace(/^\//, '')
            .replace(/\/$/, '');
        const parts = cleaned.split('/').filter(s => s.length > 1);
        return [...new Set(parts)];
    }

    const searchIndex = [];
    data.forEach(([code, models]) => {
        if (!models || models.trim() === '') return;
        const keys = extractAllKeywords(models);
        keys.forEach(key => {
            if (key.length > 1) {
                searchIndex.push({
                    key: key.toLowerCase().trim(),
                    code: code,
                    original: models
                });
            }
        });
    });
    searchIndex.sort((a, b) => b.key.length - a.key.length);

    // ================================================================
    // 4. 智能搜索函数 (支持映射转换)
    // ================================================================
    function smartSearch(query) {
        if (!query || query.trim() === '') return null;
        let q = query.trim();

        // 4.1 尝试通过 modelMap 转换入网型号
        let mapped = modelMap[q] || null;
        if (mapped) {
            console.log(`[映射] 入网型号: ${q} → 市场型号: ${mapped}`);
            q = mapped;
        }

        const searchQuery = q.toLowerCase().trim();

        // 4.2 精准匹配
        for (let item of searchIndex) {
            if (item.key === searchQuery) {
                return { code: item.code, matchedKey: item.key, source: '精准匹配' };
            }
        }

        // 4.3 包含匹配
        for (let item of searchIndex) {
            if (item.key.includes(searchQuery) && searchQuery.length >= 3) {
                return { code: item.code, matchedKey: item.key, source: '包含匹配' };
            }
        }

        // 4.4 反向包含
        for (let item of searchIndex) {
            if (searchQuery.includes(item.key) && item.key.length >= 3) {
                return { code: item.code, matchedKey: item.key, source: '反向匹配' };
            }
        }

        // 4.5 分词匹配
        const words = searchQuery.split(/[\s\/\-]+/).filter(w => w.length > 2);
        for (let word of words) {
            for (let item of searchIndex) {
                if (item.key.includes(word) || word.includes(item.key)) {
                    return { code: item.code, matchedKey: item.key, source: '分词匹配' };
                }
            }
        }

        return null;
    }

    function getRowByCode(code) {
        return data.find(row => row[0] === code);

        rows.forEach(row => {
            const tr = document.createElement('tr');
            tr.dataset.code = row[0];
            const td1 = document.createElement('td');
            td1.className = 'code-cell';
            td1.textContent = row[0];
            const td2 = document.createElement('td');
            td2.className = 'model-cell';
            td2.textContent = (row[1] || '').replace(/<br>/g, ' ').substring(0, 120) + (row[1] && row[1].length > 120 ? '…' : '');
            tr.appendChild(td1);
            tr.appendChild(td2);
            tbody.appendChild(tr);
        });
    }

    function performSearch(query) {
        if (!query || query.trim() === '') {
            document.querySelectorAll('#tableBody tr').forEach(tr => tr.classList.remove('highlight-row'));
            resultCard.style.display = 'none';
            autoTip.style.display = 'none';
            return;
        }

        const result = smartSearch(query);

        document.querySelectorAll('#tableBody tr').forEach(tr => {
            tr.classList.remove('highlight-row');
            if (result && tr.dataset.code === result.code) {
                tr.classList.add('highlight-row');
            }
        });

            const row = getRowByCode(result.code);
            resultCard.style.display = 'flex';
            resultCard.classList.remove('no-result');
            resultCode.textContent = result.code;
            const displayModel = row ? (row[1] || '') : '';
            resultModel.textContent = displayModel.length > 60 ? displayModel.substring(0,60)+'…' : displayModel;
            autoTip.style.display = 'block';
            let msg = `✅ 匹配成功！编号 ${result.code}`;
            if (result.source) msg += ` (${result.source})`;
            if (result.matchedKey) msg += ` 关键词: ${result.matchedKey}`;
            autoTip.textContent = msg;
        } else {
            resultCard.style.display = 'flex';
            resultCard.classList.add('no-result');
            resultCode.textContent = '未找到';
            resultModel.textContent = '请尝试其他关键词';
            autoTip.style.display = 'block';
            autoTip.textContent = `❌ 未匹配到对应编号，已尝试转换"${query}"，请手动输入更准确的关键词`;
        }
    }

    searchBtn.addEventListener('click', () => {
        performSearch(searchInput.value);
    });

    searchInput.addEventListener('keyup', (e) => {
        if (e.key === 'Enter') performSearch(searchInput.value);
    });

    // ================================================================
    // 7. URL 参数自动识别 (扫码入口)
    // ================================================================
    function handleUrlParams() {
        const params = new URLSearchParams(window.location.search);
        const model = params.get('model');
        if (model && model.trim() !== '') {
            searchInput.value = model;
            autoTip.style.display = 'block';
            autoTip.textContent = `🔍 检测到设备型号参数: ${model}，正在匹配...`;
            performSearch(model);
        }
    }

    // ================================================================
    // 8. 二维码生成
    // ================================================================
    const qrContainer = document.getElementById('qrcode');
    const siteUrl = 'https://wsgzgf.github.io/ghmox/';
    qrContainer.innerHTML = '';
    new QRCode(qrContainer, {
        text: siteUrl,
        width: 140,
        height: 140,
        colorDark: '#0b1e33',
        colorLight: '#ffffff',
        correctLevel: QRCode.CorrectLevel.H
    });

    // ================================================================
    // 9. 启动
    // ================================================================
    window.addEventListener('DOMContentLoaded', () => {
        handleUrlParams();
        resultCard.style.display = 'none';
        autoTip.style.display = 'none';
    });

    window.performSearch = performSearch;
})();
</script>
</body>
</html>
