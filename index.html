            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            max-width: 1000px;
            width: 100%;
            background: #ffffff;

            padding: 24px 20px 32px;
            transition: all 0.2s;
        }
        h1 {
            font-size: 1.8rem;
            font-weight: 600;
            color: #0b1e33;

            align-items: center;
            gap: 8px;
            margin-bottom: 6px;
            letter-spacing: -0.3px;
            flex-wrap: wrap;
        }
        .subhead {
            color: #4a5b6e;
            font-size: 0.95rem;
            border-left: 3px solid #2a7de1;
            padding-left: 14px;
            margin-bottom: 22px;
            background: #f0f4fe;
            border-radius: 0 12px 12px 0;
            line-height: 1.4;
            padding: 8px 16px;
            width: fit-content;
        }
        .search-section {
            display: flex;
            flex-direction: row;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 28px;
            background: #f8fafc;
            padding: 16px 18px;
            border-radius: 60px;
            align-items: center;
            justify-content: center;
            border: 1px solid #e6edf4;
        }
        .search-input-wrapper {
            flex: 2 1 240px;
            min-width: 180px;
        }
        .search-input-wrapper input {
            width: 100%;
            padding: 12px 18px;
            border: none;
            border-radius: 40px;
            background: white;
            font-size: 1rem;
            box-shadow: 0 2px 6px rgba(0,0,0,0.02);
            border: 1px solid #d9e2ec;
            transition: 0.15s;
            outline: none;
        }
        .search-input-wrapper input:focus {
            border-color: #2a7de1;
            box-shadow: 0 0 0 3px rgba(42,125,225,0.15);
        }
        .search-btn {
            background: #1a5bbf;
            border: none;
            color: white;
            padding: 12px 28px;
            border-radius: 40px;
            font-weight: 500;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.15s;
            box-shadow: 0 4px 8px rgba(26,91,191,0.2);
            border: 1px solid #1a5bbf;
            white-space: nowrap;
        }
        .search-btn:hover {
            background: #0e4a9e;
            transform: scale(0.97);
        }
        .search-btn:active {
            background: #083b7a;
        }
        .result-card {
            background: #f0f6ff;
            border-radius: 28px;
            padding: 18px 24px;
            margin: 12px 0 28px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            border: 1px solid #d4e2fc;
            transition: 0.2s;
            min-height: 70px;
        }
        .result-card .label {
            font-size: 0.9rem;
            color: #2a4c7a;
            font-weight: 500;
            letter-spacing: 0.3px;
        }
        .result-card .code {
            font-size: 2.2rem;
            font-weight: 700;
            color: #00337a;
            background: white;
            padding: 4px 20px;
            border-radius: 48px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.04);
            font-family: 'SF Mono', 'Menlo', monospace;
            letter-spacing: 1px;
        }
        .result-card .model-tag {
            background: #1a5bbf10;
            color: #1a4b8a;
            padding: 4px 14px;
            border-radius: 30px;
            font-size: 0.9rem;
            border: 1px solid #b6cef0;
        }
        .no-result {
            color: #b33;
            background: #ffeeee;
            border-color: #f5c2c2;
        }
        .grid-wrapper {
            overflow-x: auto;
            margin: 18px 0 8px;
            border-radius: 20px;
            border: 1px solid #eaf0f6;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
            min-width: 600px;
            background: white;
        }
        th {
            background: #eef3fa;
            color: #1b2c44;
            font-weight: 600;
            padding: 12px 8px;
            text-align: center;
            border-bottom: 2px solid #cad5e3;
            white-space: nowrap;
        }
        td {
            padding: 8px 6px;
            border-bottom: 1px solid #e9eef3;
            text-align: center;
            vertical-align: middle;
            word-break: break-word;
        }
        .code-cell {
            font-weight: 600;
            color: #00337a;
            background: #f5f9ff;
            font-family: 'SF Mono', 'Menlo', monospace;
            font-size: 0.8rem;
            white-space: nowrap;
        }
        .model-cell {
            text-align: left;
            font-size: 0.75rem;
            max-width: 220px;
            color: #1f3a5f;
        }
        .highlight-row {
            background: #fff5d6 !important;
            box-shadow: inset 0 0 0 2px #f7c948;
        }
        .highlight-row td {
            background: #fff5d6 !important;
        }

            margin-top: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            border-top: 1px solid #e2eaf2;
            padding-top: 28px;

            border-radius: 28px;
            box-shadow: 0 6px 16px rgba(0,0,0,0.04);

        }

            height: 140px;

            color: #3d5a78;
            font-size: 0.9rem;

        function renderTable(rows) {
            tbody.innerHTML = '';
            rows.forEach(row => {
                const tr = document.createElement('tr');
                tr.dataset.code = row[0];
                // 编号
                const td1 = document.createElement('td');
                td1.className = 'code-cell';
                td1.textContent = row[0];
                // 名称
                const td2 = document.createElement('td');
                td2.textContent = row[1] || '';
                // 主型号
                const td3 = document.createElement('td');
                td3.textContent = row[2] || '';
                // 适用机型 (截断显示)
                const td4 = document.createElement('td');
                td4.className = 'model-cell';
                td4.textContent = (row[3] || '').replace(/<br>/g, ' ').substring(0, 120) + (row[3] && row[3].length > 120 ? '…' : '');

                tr.appendChild(td2);
                tr.appendChild(td3);
                tr.appendChild(td4);
                tbody.appendChild(tr);
            });
        }

        const searchInput = document.getElementById('searchInput');

        const resultCard = document.getElementById('resultCard');
        const resultCode = document.getElementById('resultCode');
        const resultModel = document.getElementById('resultModel');

        function performSearch() {
            const keyword = searchInput.value.trim();
            if (keyword === '') {
                // 清除高亮
                document.querySelectorAll('#tableBody tr').forEach(tr => tr.classList.remove('highlight-row'));
                resultCard.style.display = 'none';
                return;
            }
            const lower = keyword.toLowerCase();
            let foundRow = null;
            let foundCode = '';
            let foundModel = '';
            // 遍历数据 (优先匹配 主型号 和 适用机型)
            for (let row of data) {
                const code = row[0];
                const mainModel = (row[2] || '').toLowerCase();
                const models = (row[3] || '').toLowerCase();
                // 同时检查 主型号 和 适用机型字段
                if (mainModel.includes(lower) || models.includes(lower)) {
                    foundRow = row;
                    foundCode = row[0];
                    foundModel = row[2] || row[3] || '';
                    break;
                }
            }
            // 高亮
            document.querySelectorAll('#tableBody tr').forEach(tr => {
                tr.classList.remove('highlight-row');
                if (foundRow && tr.dataset.code === foundCode) {
                    tr.classList.add('highlight-row');
                }
            });

            if (foundRow) {
                resultCard.style.display = 'flex';
                resultCode.textContent = foundCode;
                const displayModel = foundRow[2] || foundRow[3] || '—';
                resultModel.textContent = displayModel.length > 40 ? displayModel.substring(0,40)+'…' : displayModel;
                resultCard.classList.remove('no-result');
            } else {
                resultCard.style.display = 'flex';
                resultCode.textContent = '未找到';
                resultModel.textContent = '请尝试其他关键词';
                resultCard.classList.add('no-result');
            }
        }

            if (e.key === 'Enter') performSearch();
        });

            colorLight: '#ffffff',
            correctLevel: QRCode.CorrectLevel.H
        });

        setTimeout(() => {
            resultCard.style.display = 'none';
        }, 100);
